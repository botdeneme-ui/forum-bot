name: Forum Bot

on:
  workflow_dispatch:

jobs:
  kontrol:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kütüphaneleri yükle
        run: pip install -r requirements.txt

      - name: Botu çalıştır
        run: python bot.py
