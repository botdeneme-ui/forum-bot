name: Forum Bot

on:
  workflow_dispatch:

  push:
    branches:
      - main

  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  kontrol:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Çalışma zamanı
        run: date

      - name: Botu çalıştır
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: last_topic.txt kaydet
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add last_topic.txt
          git diff --cached --quiet || git commit -m "Update last topic"
          git push
